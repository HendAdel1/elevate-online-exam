<form class="space-y-6 font-geist mt-4" [formGroup]="form" (ngSubmit)="onSubmit()">
  <!-- Email -->
  <div>
    <label class="block text-base font-medium text-gray-800 mb-2"> Email </label>

    <input
      #emailInput
      formControlName="email"
      type="email"
      placeholder="user@example.com"
      class="w-full border border-gray-200 px-4 py-3 focus:outline-none focus:border-blue-600 placeholder:text-gray-400"
    />

    @if (form.get('email')?.invalid && form.get('email')?.touched) {
      <div class="text-red-500 text-sm mt-1">Please enter a valid email address.</div>
    }
  </div>

  <!-- Success Message -->
  @if (message() && !isSubmitting()) {
    <div class="p-3 bg-green-50 border border-green-200 text-green-800 rounded-md text-sm">
      {{ message() }}
    </div>
  }

  <!-- Error Message -->
  @if (message() && isSubmitting()) {
    <div class="p-3 bg-red-50 border border-red-200 text-red-800 rounded-md text-sm">
      {{ message() }}
    </div>
  }

  <!-- Button -->
  <app-auth-button
    variant="secondary"
    [hasIcon]="true"
    type="submit"
    [disabled]="form.invalid || isSubmitting()"
  >
    @if (!isSubmitting()) {
      <span>Next</span>
    } @else {
      <span>Sending...</span>
    }
  </app-auth-button>
</form>
