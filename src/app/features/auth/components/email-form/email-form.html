<form class="space-y-6 font-geist mt-4" [formGroup]="form" (ngSubmit)="onSubmit()">
  <!-- Email -->
  <div>
    <label class="block text-base font-medium text-gray-800 mb-2"> Email </label>

    <input #emailInput formControlName="email" type="email" placeholder="user@example.com" [class]="
        'w-full border px-4 py-3 focus:outline-none placeholder:text-gray-400 ' +
        (emailControl.invalid && emailControl.touched
          ? 'border-red-500 focus:border-red-500'
          : 'border-gray-200 focus:border-blue-600')
      " />

      @if (emailErrorMessage) {
        <div class="text-red-500 text-sm mt-1">
          {{ emailErrorMessage }}
        </div>
      }

    <!-- Success Message -->
    @if (successMessage()) {
    <div class="p-3 bg-green-50 border border-green-200 text-green-800 rounded-md text-sm">
      {{ successMessage() }}
    </div>
    }

    <!-- Error Message -->
    @if (errorMessage()) {
    <div class="p-3 bg-red-50 border border-red-200 text-red-800 rounded-md text-sm">
      {{ errorMessage() }}
    </div>
    }

    <!-- Button -->
    <app-auth-button variant="secondary" [hasIcon]="true" type="submit" [disabled]="isSubmitting()">
      @if (!isSubmitting()) {
      <span>Next</span>
      } @else {
      <span>Sending...</span>
      }
    </app-auth-button>
  </div>
</form>
