<form class="space-y-6 font-geist mt-10">

  <!-- Password -->
  <div>
    <label class="block text-base font-medium text-gray-800 mb-2">
      Password<span class="text-red-600 ml-0.5">*</span>
    </label>

    <div class="flex flex-col relative">
      <input [type]="showPassword ? 'text' : 'password'" placeholder="********" formControlName="password"
        class="w-full border border-gray-200 px-4 py-3 pr-10 focus:outline-none focus:border-blue-600 placeholder:text-gray-400"
        [class.border-red-500]="password?.touched && password?.invalid" />
      @if(password?.touched && password?.invalid){
      <p class="font-geist text-red-600 text-sm mt-1">
        Your password is required
      </p>
      }
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer" (click)="togglePassword()">
        <i-lucide [name]="showPassword ? 'eye-off' : 'eye'" [size]="18" class="text-gray-300"></i-lucide>
      </span>
    </div>
  </div>

  <!-- Confirm Password -->
  <div>
    <label class="block text-base font-medium text-gray-800 mb-2">
      Confirm Password<span class="text-red-600 ml-0.5">*</span>
    </label>

    <div class="flex flex-col relative">
      <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="********" formControlName="confirmPassword"
        class="w-full border border-gray-200 px-4 py-3 pr-10 focus:outline-none focus:border-blue-600 placeholder:text-gray-400"
        [class.border-red-500]="confirmPassword?.touched && confirmPassword?.invalid" />
      @if(confirmPassword?.touched && confirmPassword?.invalid){
      <p class="font-geist text-red-600 text-sm mt-1">
        Your confirm password is required
      </p>
      }
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer" (click)="toggleConfirmPassword()">
        <i-lucide [name]="showConfirmPassword ? 'eye-off' : 'eye'" [size]="18" class="text-gray-300"></i-lucide>
      </span>
    </div>
  </div>


  <!-- Button -->
  <app-auth-button variant="primary">Create Account</app-auth-button>

</form>
