<button (click)="togglePanel()"
  class="fixed bottom-4 right-4 z-50 bg-blue-600 text-white p-2 rounded-full shadow-lg hover:bg-blue-700 transition">
  {{ panelOpen ? 'close' : 'Dev' }}
</button>

<!-- Dev Panel -->
@if(panelOpen){
<div
  class="fixed bottom-16 right-4 bg-white border border-gray-300 shadow-lg rounded p-3 z-50 space-y-2 w-48 transition-all duration-300">
  <h3 class="font-bold text-gray-700">Dev Panel</h3>
  <ul class="space-y-1">
    <li><a routerLink="/auth/login" class="text-blue-600 hover:underline">Login</a></li>
    <li><a routerLink="/auth/register" class="text-blue-600 hover:underline">Register</a></li>
    <li><a routerLink="/auth/forgot-password" class="text-blue-600 hover:underline">Forgot Password</a></li>
    <li><a routerLink="/auth/verify-otp" class="text-blue-600 hover:underline">Verify OTP</a></li>
    <li><a routerLink="/auth/verify-email" class="text-blue-600 hover:underline">Verify Email</a></li>
    <li><a routerLink="/auth/create-password" class="text-blue-600 hover:underline">Create Password</a></li>
  </ul>
</div>
}
